const PLOT_H = 560;
const SENT = GRID.sent_order;   // 改善 稳定 恶化
const SALES = GRID.sales_order; // 上升 平稳 下降 业务丢失
const C = GRID.cells;

const colTotals = {};
SENT.forEach(se => colTotals[se] = SALES.reduce((s,st)=>s+C[`${st}|${se}`].magnitude,0));
const grandTotal = Object.values(colTotals).reduce((a,b)=>a+b,0);

const dirMap = {'上升':'↑ 增长','平稳':'→ 平稳','下降':'↓ 下降','业务丢失':'✕ 丢失'};

function baseFill(st, rate){
  const t = Math.min(Math.abs(rate),1);
  if(st==='上升') return `rgba(22,163,74,${(0.14+0.34*t).toFixed(3)})`;
  if(st==='下降') return `rgba(220,38,38,${(0.14+0.34*t).toFixed(3)})`;
  if(st==='业务丢失') return '#7f1d1d';
  return 'rgba(120,118,110,0.30)';
}

// 列头
const ch = document.getElementById('colhead');
SENT.forEach(se=>{
  const w = colTotals[se]/grandTotal*100;
  const d = document.createElement('div');
  d.className='ch'; d.style.flexBasis=w+'%';
  d.innerHTML = `<b>舆情${se}</b>体量 ${Math.round(colTotals[se])}万 · 占${w.toFixed(0)}%`;
  ch.appendChild(d);
});

// 矩阵
const mekko = document.getElementById('mekko');
SENT.forEach(se=>{
  const colW = colTotals[se]/grandTotal*100;
  const col = document.createElement('div');
  col.className='col'; col.style.flexBasis=colW+'%'; col.style.maxWidth=colW+'%';
  SALES.forEach(st=>{
    const d = C[`${st}|${se}`];
    const hPct = colTotals[se]>0 ? d.magnitude/colTotals[se]*100 : 0;
    const cellPx = PLOT_H*hPct/100;
    const cell = document.createElement('div');
    cell.className='cell';
    cell.style.flexBasis = hPct+'%';
    cell.style.background = baseFill(st, d.rate);

    // 变动色块（净增长 or 净流失），高度 = 变动额 / 体量
    let changeFrac = 0, changeColor = '';
    if(st==='上升'){ changeFrac = d.magnitude>0 ? d.growth/d.magnitude : 0; changeColor='#16a34a'; }
    else if(st==='下降'){ changeFrac = d.magnitude>0 ? d.loss/d.magnitude : 0; changeColor='#dc2626'; }
    if(changeFrac>0){
      const cb = document.createElement('div');
      cb.className='change-block';
      cb.style.height=(changeFrac*100).toFixed(1)+'%';
      cb.style.background=changeColor;
      cb.style.opacity='0.92';
      cell.appendChild(cb);
    }

    // 文字（够高才显示）
    if(cellPx > 34){
      const isLost = st==='业务丢失';
      const txtColor = (st==='业务丢失') ? '#fff' : '#1c1c1a';
      const amtTxt = st==='上升' ? `+${d.growth}万`
                   : (st==='下降' ? `−${d.loss}万`
                   : (st==='业务丢失' ? `丢失 ${d.loss}万` : `${d.s26}万`));
      const body = document.createElement('div');
      body.className='body';
      body.style.color=txtColor;
      let sub2 = '';
      if(cellPx>56 && st!=='业务丢失') sub2 = `<div class="sub2">26销量 ${d.s26}万</div>`;
      body.innerHTML = `<div class="dir">${dirMap[st]}</div><div class="amt">${amtTxt}</div>${sub2}`;
      cell.appendChild(body);
    }

    // 家数徽标 + hover
    const badge = document.createElement('div');
    badge.className='badge';
    badge.textContent = d.count + '家';
    badge.addEventListener('mouseenter', e=>showTip(e, d, st, se));
    badge.addEventListener('mousemove', moveTip);
    badge.addEventListener('mouseleave', hideTip);
    cell.appendChild(badge);

    col.appendChild(cell);
  });
  mekko.appendChild(col);
});

// Tooltip
const tip = document.getElementById('tip');
function showTip(e, d, st, se){
  const rows = d.top10.map(h=>{
    const cls = h.chg>=0?'up':'dn';
    const sign = h.chg>=0?'+':'−';
    return `<tr><td class="n">${h.name}<span style="color:#999"> · ${h.prov}</span></td>
            <td class="v">${h.s25}→${h.s26}</td>
            <td class="v ${cls}">${sign}${Math.abs(h.chg)}</td></tr>`;
  }).join('');
  const title = `销量${st} × 舆情${se} · ${d.count}家`;
  const summ = st==='上升' ? `净增 +${d.growth}万 (26销量${d.s26}万)`
             : (st==='下降' ? `净流失 ${d.loss}万 (26销量${d.s26}万)`
             : (st==='业务丢失' ? `完全丢失 ${d.loss}万` : `平稳 (26销量${d.s26}万)`));
  tip.innerHTML = `<h4>${title}</h4><div style="color:#5f5e5a;margin-bottom:6px;">${summ} · Top10（万元）</div>
    <table>${rows}</table>`;
  tip.style.display='block';
  moveTip(e);
}
function moveTip(e){
  const pad=14, w=tip.offsetWidth, h=tip.offsetHeight;
  let x=e.clientX+pad, y=e.clientY+pad;
  if(x+w>window.innerWidth) x=e.clientX-w-pad;
  if(y+h>window.innerHeight) y=window.innerHeight-h-8;
  tip.style.left=x+'px'; tip.style.top=Math.max(8,y)+'px';
}
function hideTip(){ tip.style.display='none'; }

// 底注
const errA = C['上升|恶化'].count+C['平稳|恶化'].count;
const errB = C['下降|改善'].count+C['下降|稳定'].count+C['业务丢失|改善'].count+C['业务丢失|稳定'].count;
document.getElementById('note').innerHTML =
  `<b>读图：</b>最大的两块红色——「下降×稳定」(98家流失1841万) 与「下降×恶化」(73家流失1326万)——是损失主体；`+
  `舆情恶化但仍增长的「上升×恶化」(43家净增816万) 是逆境韧性样板。`+
  `<b>错配合计</b>：舆情未恶化却下滑/丢失 ${errB}家、舆情恶化却增长/平稳 ${errA}家，`+
  `印证舆情与销量相关系数仅 0.085 —— 销量主因在舆情之外。`;
</script>
